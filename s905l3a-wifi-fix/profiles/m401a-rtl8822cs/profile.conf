PROFILE_ID="m401a-rtl8822cs-v1"
PROFILE_DESCRIPTION="M401A S905L3A with RTL8822CS on SDIO-A"
PATCH_MODE="configure-sdio"
MODEL_EXACT="M401A"
COMPATIBLE_REQUIRED="amlogic,g12a"
DTB_BASENAME="meson-g12a-s905l3a-m401a.dtb"
SDIO_PATH="/soc/mmc@ffe03000"
SDIO_PINCTRL_PATH="/soc/bus@ff600000/bus@34400/pinctrl@40/sdio"
SDIO_CLK_GATE_PATH="/soc/bus@ff600000/bus@34400/pinctrl@40/sdio_clk_gate"
GPIO_CONTROLLER_PATH="/soc/bus@ff600000/bus@34400/pinctrl@40/bank@40"
VMMC_REGULATOR_PATH="/regulator-vddao-3v3"
VQMMC_REGULATOR_PATH="/regulator-vddao-3v3"
PWRSEQ_PATH="/sdio-pwrseq"
# fdtput type "x" values are hexadecimal: 0x47 is decimal 71 (GPIOX_7).
RESET_GPIO_OFFSET="47"
RESET_GPIO_FLAGS="1"
POST_POWER_ON_DELAY_MS="10"
MAX_FREQUENCY="100000000"
EXPECTED_DRIVER="rtw88_8822cs"
EXPECTED_INTERFACE="wlan0"
